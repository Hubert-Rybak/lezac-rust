name: Deploy WASM to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Assemble site
        run: |
          mkdir -p _site
          cp web/* _site/
          cp target/wasm32-unknown-unknown/release/larax-zaco.wasm _site/
          # The WASM fetches its data files from assets/ at runtime, so they
          # must ship with the site. Exclude the original DOS executable, which
          # the port never loads.
          mkdir -p _site/assets
          cp assets/* _site/assets/
          rm -f _site/assets/LEZAC.EXE

      # One-time repo setup required: Settings -> Pages -> Source: "GitHub Actions"
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
